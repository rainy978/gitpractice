<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>新能源汽车电池健康评估系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        /* 按钮 */
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        /* 结果区域 */
        .result {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .health-score {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
            position: relative;
        }

        .score-circle svg {
            transform: rotate(-90deg);
        }

        .score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .score-number {
            font-size: 36px;
            font-weight: bold;
            color: #333;
        }

        .score-unit {
            font-size: 14px;
            color: #666;
        }

        .health-status {
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
        }

        .health-good { color: #27ae60; }
        .health-fair { color: #f39c12; }
        .health-poor { color: #e74c3c; }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .metric-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .metric-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .suggestion {
            background: #e8f4fd;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .suggestion h3 {
            color: #2980b9;
            margin-bottom: 10px;
        }

        .suggestion ul {
            margin-left: 20px;
            color: #555;
        }

        .suggestion li {
            margin: 8px 0;
        }

        /* 分享区域 */
        .share-section {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .share-url {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px;
            margin: 15px 0;
            word-break: break-all;
            font-family: monospace;
            font-size: 14px;
        }

        .share-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .share-btn {
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .share-btn:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        .share-btn.wechat { background: #2b9c3c; }
        .share-btn.weibo { background: #e6162d; }
        .share-btn.copy { background: #667eea; }

        /* 历史记录 */
        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            background: #f8f9fa;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .history-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .clear-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            .card {
                padding: 20px;
            }
            
            .metrics-grid {
                grid-template-columns: 1fr;
            }
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔋 新能源汽车电池健康评估</h1>
            <p>专业评估电池寿命、续航能力和健康状况</p>
        </div>

        <div class="card">
            <h2>📊 车辆信息输入</h2>
            <form id="batteryForm">
                <div class="form-group">
                    <label>🚗 车辆品牌</label>
                    <select id="brand" required>
                        <option value="tesla">特斯拉 (Tesla)</option>
                        <option value="byd">比亚迪 (BYD)</option>
                        <option value="nio">蔚来 (NIO)</option>
                        <option value="xpeng">小鹏 (XPENG)</option>
                        <option value="li">理想 (Li Auto)</option>
                        <option value="other">其他品牌</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>📅 电池类型</label>
                    <select id="batteryType" required>
                        <option value="lifepo4">磷酸铁锂 (LFP)</option>
                        <option value="nmc">三元锂 (NMC)</option>
                        <option value="other">其他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>⏱️ 使用年限 (年)</label>
                    <input type="number" id="age" min="0" max="20" step="0.5" required placeholder="例如: 3">
                </div>

                <div class="form-group">
                    <label>📏 总行驶里程 (公里)</label>
                    <input type="number" id="mileage" min="0" max="500000" step="1000" required placeholder="例如: 50000">
                </div>

                <div class="form-group">
                    <label>🔋 当前满电续航 (公里)</label>
                    <input type="number" id="currentRange" min="0" max="1000" required placeholder="例如: 400">
                </div>

                <div class="form-group">
                    <label>⚡ 原始标称续航 (公里)</label>
                    <input type="number" id="originalRange" min="0" max="1000" required placeholder="例如: 500">
                </div>

                <button type="submit" class="btn">🔍 评估电池健康度</button>
            </form>
        </div>

        <div id="result" class="result">
            <div class="card">
                <h2>📈 评估结果</h2>
                <div id="resultContent"></div>
            </div>
        </div>

        <div class="card">
            <h2>🔗 分享与链接</h2>
            <div class="share-section">
                <p>💡 通过以下链接分享此评估工具：</p>
                <div class="share-url" id="shareUrl">加载中...</div>
                <div class="share-buttons">
                    <button class="share-btn copy" onclick="copyUrl()">📋 复制链接</button>
                    <button class="share-btn wechat" onclick="shareToWechat()">💬 微信分享</button>
                    <button class="share-btn weibo" onclick="shareToWeibo()">🐦 微博分享</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📜 最近评估记录</h2>
            <div id="historyList" class="history-list">
                <p style="color: #999; text-align: center;">暂无评估记录</p>
            </div>
            <button class="clear-btn" onclick="clearHistory()">🗑️ 清空历史记录</button>
        </div>

        <footer>
            <p>数据仅供参考，实际电池状况请以专业检测为准 | 基于行业大数据分析模型</p>
        </footer>
    </div>

    <script>
        // 电池健康评估算法
        function calculateHealthScore(brand, batteryType, age, mileage, currentRange, originalRange) {
            // 基础健康度计算
            let rangeHealth = (currentRange / originalRange) * 100;
            
            // 年限衰减系数（每年约2-3%衰减）
            let ageDecay = Math.min(30, age * 2.5);
            
            // 里程衰减系数（每1万公里约0.8%衰减）
            let mileageDecay = Math.min(30, (mileage / 10000) * 0.8);
            
            // 电池类型系数
            let batteryFactor = batteryType === 'lifepo4' ? 1.05 : (batteryType === 'nmc' ? 0.98 : 1.0);
            
            // 品牌系数
            let brandFactor = 1.0;
            if (brand === 'tesla') brandFactor = 1.02;
            else if (brand === 'byd') brandFactor = 1.03;
            else if (brand === 'nio') brandFactor = 1.01;
            
            // 综合健康度
            let rawScore = rangeHealth * 0.6 + (100 - ageDecay) * 0.2 + (100 - mileageDecay) * 0.2;
            rawScore = rawScore * batteryFactor * brandFactor;
            
            // 限制在0-100之间
            let finalScore = Math.min(100, Math.max(0, rawScore));
            
            return Math.round(finalScore);
        }
        
        function getHealthStatus(score) {
            if (score >= 80) return { text: '优秀', class: 'health-good', icon: '🌟' };
            if (score >= 60) return { text: '良好', class: 'health-fair', icon: '👍' };
            return { text: '需关注', class: 'health-poor', icon: '⚠️' };
        }
        
        function getSuggestions(score, age, mileage, batteryType) {
            let suggestions = [];
            
            if (score >= 80) {
                suggestions.push('✅ 电池状态优秀，继续保持良好的充电习惯');
                suggestions.push('✅ 建议每半年进行一次电池均衡充电');
            } else if (score >= 60) {
                suggestions.push('📌 电池有一定衰减，属于正常现象');
                suggestions.push('📌 建议避免频繁快充，多使用慢充保养电池');
                suggestions.push('📌 保持电量在20%-80%之间使用最佳');
            } else {
                suggestions.push('⚡ 电池衰减较明显，建议关注电池健康状况');
                suggestions.push('⚡ 可能影响续航里程，长途出行需提前规划');
                suggestions.push('⚡ 建议到专业机构进行深度电池检测');
            }
            
            if (age > 5) {
                suggestions.push('📅 车辆使用年限较长，电池性能自然衰减');
            }
            
            if (mileage > 100000) {
                suggestions.push('🔧 行驶里程较高，建议检查电池组一致性');
            }
            
            if (batteryType === 'lifepo4') {
                suggestions.push('🔋 磷酸铁锂电池建议定期充满以校准电量显示');
            } else if (batteryType === 'nmc') {
                suggestions.push('🔋 三元锂电池建议避免满电存放');
            }
            
            return suggestions;
        }
        
        // 渲染结果
        function renderResult(data) {
            const { brand, batteryType, age, mileage, currentRange, originalRange, score } = data;
            const status = getHealthStatus(score);
            const suggestions = getSuggestions(score, age, mileage, batteryType);
            
            const estimatedRange = Math.round(originalRange * (score / 100));
            const estimatedLife = Math.max(1, Math.round(8 * (score / 100)));
            
            const html = `
                <div class="health-score">
                    <div class="score-circle">
                        <svg width="150" height="150">
                            <circle cx="75" cy="75" r="65" fill="none" stroke="#e0e0e0" stroke-width="8"/>
                            <circle cx="75" cy="75" r="65" fill="none" stroke="${score >= 80 ? '#27ae60' : (score >= 60 ? '#f39c12' : '#e74c3c')}" 
                                    stroke-width="8" stroke-dasharray="${2 * Math.PI * 65}" stroke-dashoffset="${2 * Math.PI * 65 * (1 - score/100)}"
                                    stroke-linecap="round"/>
                        </svg>
                        <div class="score-text">
                            <div class="score-number">${score}</div>
                            <div class="score-unit">分</div>
                        </div>
                    </div>
                    <div class="health-status ${status.class}">
                        ${status.icon} 电池健康度：${status.text}
                    </div>
                </div>
                
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-label">🔋 当前健康度</div>
                        <div class="metric-value">${score}%</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">📊 预期剩余寿命</div>
                        <div class="metric-value">${estimatedLife} 年</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">🔋 预估续航</div>
                        <div class="metric-value">${estimatedRange} km</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">📉 续航衰减率</div>
                        <div class="metric-value">${Math.round((1 - currentRange/originalRange) * 100)}%</div>
                    </div>
                </div>
                
                <div class="suggestion">
                    <h3>💡 保养建议</h3>
                    <ul>
                        ${suggestions.map(s => `<li>${s}</li>`).join('')}
                    </ul>
                </div>
            `;
            
            document.getElementById('resultContent').innerHTML = html;
            document.getElementById('result').style.display = 'block';
            
            // 滚动到结果
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }
        
        // 保存评估记录
        function saveToHistory(data) {
            let history = JSON.parse(localStorage.getItem('batteryHistory') || '[]');
            const record = {
                ...data,
                timestamp: new Date().toLocaleString(),
                id: Date.now()
            };
            history.unshift(record);
            if (history.length > 10) history = history.slice(0, 10);
            localStorage.setItem('batteryHistory', JSON.stringify(history));
            displayHistory();
        }
        
        // 显示历史记录
        function displayHistory() {
            const history = JSON.parse(localStorage.getItem('batteryHistory') || '[]');
            const historyList = document.getElementById('historyList');
            
            if (history.length === 0) {
                historyList.innerHTML = '<p style="color: #999; text-align: center;">暂无评估记录</p>';
                return;
            }
            
            historyList.innerHTML = history.map(record => `
                <div class="history-item" onclick="loadHistoryRecord(${record.id})">
                    <div>
                        <strong>${getBrandName(record.brand)}</strong> | 
                        健康度: ${record.score}分 | 
                        ${record.age}年/${record.mileage}km
                    </div>
                    <small style="color: #999;">${record.timestamp}</small>
                </div>
            `).join('');
        }
        
        function getBrandName(brand) {
            const brands = {
                'tesla': '特斯拉', 'byd': '比亚迪', 'nio': '蔚来',
                'xpeng': '小鹏', 'li': '理想', 'other': '其他'
            };
            return brands[brand] || brand;
        }
        
        function loadHistoryRecord(id) {
            const history = JSON.parse(localStorage.getItem('batteryHistory') || '[]');
            const record = history.find(r => r.id === id);
            if (record) {
                document.getElementById('brand').value = record.brand;
                document.getElementById('batteryType').value = record.batteryType;
                document.getElementById('age').value = record.age;
                document.getElementById('mileage').value = record.mileage;
                document.getElementById('currentRange').value = record.currentRange;
                document.getElementById('originalRange').value = record.originalRange;
                renderResult(record);
            }
        }
        
        function clearHistory() {
            if (confirm('确定要清空所有历史记录吗？')) {
                localStorage.removeItem('batteryHistory');
                displayHistory();
            }
        }
        
        // 表单提交处理
        document.getElementById('batteryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const brand = document.getElementById('brand').value;
            const batteryType = document.getElementById('batteryType').value;
            const age = parseFloat(document.getElementById('age').value);
            const mileage = parseFloat(document.getElementById('mileage').value);
            const currentRange = parseFloat(document.getElementById('currentRange').value);
            const originalRange = parseFloat(document.getElementById('originalRange').value);
            
            // 验证
            if (currentRange > originalRange) {
                alert('当前续航不能超过原始标称续航，请检查输入！');
                return;
            }
            
            const score = calculateHealthScore(brand, batteryType, age, mileage, currentRange, originalRange);
            const resultData = { brand, batteryType, age, mileage, currentRange, originalRange, score };
            
            renderResult(resultData);
            saveToHistory(resultData);
        });
        
        // 分享功能
        function getCurrentUrl() {
            return window.location.href;
        }
        
        function copyUrl() {
            const url = getCurrentUrl();
            navigator.clipboard.writeText(url).then(() => {
                alert('链接已复制！可以分享给朋友了');
            });
        }
        
        function shareToWechat() {
            alert('请点击右上角菜单选择"发送给朋友"或"分享到朋友圈"');
        }
        
        function shareToWeibo() {
            const url = encodeURIComponent(getCurrentUrl());
            const title = encodeURIComponent('新能源汽车电池健康评估 - 免费检测你的电池健康度');
            window.open(`http://service.weibo.com/share/share.php?url=${url}&title=${title}`, '_blank');
        }
        
        // 显示当前链接
        function displayShareUrl() {
            document.getElementById('shareUrl').textContent = getCurrentUrl();
        }
        
        // 页面加载时显示链接和历史
        displayShareUrl();
        displayHistory();
        
        // 添加示例数据填充功能（可选）
        function fillExample() {
            document.getElementById('brand').value = 'tesla';
            document.getElementById('batteryType').value = 'nmc';
            document.getElementById('age').value = '3';
            document.getElementById('mileage').value = '45000';
            document.getElementById('currentRange').value = '420';
            document.getElementById('originalRange').value = '500';
        }
        
        // 控制台提示
        console.log('电池健康评估系统已加载 | 数据保存在本地');
    </script>
</body>
</html>
